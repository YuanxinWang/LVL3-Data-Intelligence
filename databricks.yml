# This is a Databricks asset bundle definition for LVL3-Data-Intelligence.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: LVL3-Data-Intelligence

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-6353a6c5-179c.cloud.databricks.com

  ## Optionally, there could be 'staging' or 'prod' targets here.
  #
  # prod:
  #   workspace:
  #     host: https://dbc-6353a6c5-179c.cloud.databricks.com

resources:
  jobs:
    my_test_job:
      name: "[Test] Bundle auto deploy job"
      tasks:
        - task_key: run_test_code
          spark_python_task:
            python_file: ./testtest.py
          job_cluster_key: Job_Cluster
      job_clusters:
        - job_cluster_key: Job_Cluster
          new_cluster:
            spark_version: 13.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1