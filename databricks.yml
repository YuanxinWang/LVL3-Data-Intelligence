bundle:
  name: LVL3-Data-Intelligence

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-6353a6c5-179c.cloud.databricks.com

resources:
  jobs:
    # Job 1: Daily Pipeline for FRA Flights (API -> JSON -> Bronze)
    FRA_flights_pipeline:
      name: "[Pipeline][Daily] FRA arr&dep to Bronze"
      schedule:
        quartz_cron_expression: "0 0 23 * * ?"
        timezone_id: "Europe/Berlin"
      environments:
        - environment_key: my_serverless_env
          spec:
            environment_version: "4"
            
      tasks:
        # Task 1: Fetch FRA Flights Data from API
        - task_key: fetch_fra_flights
          environment_key: my_serverless_env
          spark_python_task:
            python_file: ./src/ingestion/fetch_airport_arr_dep.py
  
        # Task 2: Load FRA Flights Data into Bronze Delta Table
        - task_key: run_autoloader_flights
          depends_on:
            - task_key: fetch_fra_flights
          environment_key: my_serverless_env
          spark_python_task:
            python_file: ./src/transformation/load_bronze_flights.py


    # Job 2: Monthly Fetch of Reference Data (API ->JSON -> Bronze -> Silver)
    Reference_data:
      name: "[Pipeline][Monthly] Reference Data"
      schedule:
        quartz_cron_expression: "0 0 2 1 * ?"
        timezone_id: "Europe/Berlin"
      environments:
        - environment_key: my_serverless_env
          spec:
            environment_version: "4"

      tasks:
        # Task 1: Fetch Reference Data from API
        - task_key: fetch_ref_data
          environment_key: my_serverless_env
          spark_python_task:
            python_file: ./src/ingestion/fetch_reference_data.py

        # Task 2: Load Reference Data into Bronze Delta Tables
        - task_key: run_autoloader_ref
          depends_on:
            - task_key: fetch_ref_data
          environment_key: my_serverless_env
          spark_python_task:
            python_file: ./src/transformation/load_bronze_reference.py

        # Task 3: Extract and Flatten into Silver Tmp/Dim Tables
        - task_key: run_silver_ref
          depends_on:
            - task_key: run_autoloader_ref
          environment_key: my_serverless_env
          spark_python_task:
            python_file: ./src/transformation/load_silver_reference.py

        # Task 4: Assemble Final Silver Dimension Tables
        - task_key: assemble_final_dimensions
          depends_on:
            - task_key: run_silver_ref
          environment_key: my_serverless_env
          spark_python_task:
            python_file: ./src/transformation/assemble_silver_dim.py


    # Job 3: Test Silver Flight
    Test_silver_flights:
      name: "[Test] Load Silver Flight Status"
      environments:
        - environment_key: my_serverless_env
          spec:
            environment_version: "4"
      tasks:
        - task_key: run_silver_flights
          environment_key: my_serverless_env
          spark_python_task:
            python_file: ./src/transformation/load_silver_flights.py
            

# databricks bundle deploy -t dev
# databricks bundle run FRA_flights_pipeline -t dev
