bundle:
  name: LVL3-Data-Intelligence

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-6353a6c5-179c.cloud.databricks.com

resources:
  jobs:
    my_test_job:
      name: "[dev] Bundle auto deploy job"
      environments:
        - environment_key: my_serverless_env
          spec:
            environment_version: "4"
            
      tasks:
        - task_key: run_test_code
          environment_key: my_serverless_env
          spark_python_task:
            python_file: ./testtest.py